server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # User Service
    location /api/user/ {
        proxy_pass http://user-service:8080/;
    }

    # Shipment Service
    location /api/shipment/ {
        proxy_pass http://shipment-service:8081/;
    }

    # ML Service
    location /api/ml/ {
        proxy_pass http://ml-service:8000/;
    }
}